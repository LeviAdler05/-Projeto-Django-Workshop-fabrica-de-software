<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0f;
            --surface: #141416;
            --surface2: #1a1a1e;
            --border: #222228;
            --border-focus: rgba(200,245,90,0.5);
            --accent: #c8f55a;
            --accent-dim: rgba(200,245,90,0.10);
            --text: #f0f0f0;
            --muted: #6b6b7a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            background-image:
                radial-gradient(ellipse 50% 40% at 15% 20%, rgba(200,245,90,0.05) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 85% 80%, rgba(200,245,90,0.04) 0%, transparent 50%);
        }

        .card {
            width: 100%;
            max-width: 520px;
            animation: fadeUp 0.5s ease both;
        }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 32px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--accent); }

        .back-link svg { transition: transform 0.2s; }
        .back-link:hover svg { transform: translateX(-3px); }

        /* Header */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);
            border: 1px solid rgba(200,245,90,0.3);
            color: var(--accent);
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 100px;
            margin-bottom: 14px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        h1 span { color: var(--accent); }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            font-weight: 300;
            margin-bottom: 36px;
        }

        /* Form panel */
        .form-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
        }

        /* Django renders form.as_p as <p><label>...<input>...</p> */
        /* We style the generated markup */
        .form-panel p {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-panel p:last-of-type {
            margin-bottom: 0;
        }

        .form-panel label {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .form-panel input[type="text"],
        .form-panel input[type="email"],
        .form-panel input[type="number"],
        .form-panel input[type="tel"],
        .form-panel input[type="password"],
        .form-panel input[type="url"],
        .form-panel input,
        .form-panel select,
        .form-panel textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 12px 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            appearance: none;
        }

        .form-panel input:focus,
        .form-panel select:focus,
        .form-panel textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(200,245,90,0.08);
            background: #1e1e23;
        }

        .form-panel input::placeholder,
        .form-panel textarea::placeholder {
            color: var(--muted);
        }

        .form-panel textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Error messages from Django */
        .form-panel ul.errorlist {
            list-style: none;
            margin-top: 4px;
        }

        .form-panel ul.errorlist li {
            font-size: 12px;
            color: #ff6b6b;
        }

        /* Help text */
        .form-panel .helptext,
        .form-panel span.helptext {
            font-size: 12px;
            color: var(--muted);
            font-style: italic;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        /* Footer actions */
        .form-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-submit {
            flex: 1;
            background: var(--accent);
            color: #0d0d0f;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            padding: 13px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: #d9ff70;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(200,245,90,0.25);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 13px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn-cancel:hover {
            border-color: var(--muted);
            color: var(--text);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="card">

    <a href="{% url 'listar_pessoas' %}" class="back-link">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar para lista
    </a>

    <div class="badge">Novo Registro</div>
    <h1>Cadastro de <span>Pessoas</span></h1>
    <p class="subtitle">Preencha os dados para adicionar um novo contato.</p>

    <div class="form-panel">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="divider"></div>
            <div class="form-actions">
                <a href="{% url 'listar_pessoas' %}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit">
                    <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.5 7.5L6 11L12.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Salvar Pessoa
                </button>
            </div>
        </form>
    </div>

</div>
</body>
</html>
